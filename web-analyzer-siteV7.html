<style>
  *{box-sizing:border-box}
  body{margin:0;font-family:system-ui,-apple-system,sans-serif;color:#1e293b}

  /* Scanner screen */

  .planSub{font-size:14px;font-weight:800;color:#0f172a;margin:18px 0 4px;display:flex;align-items:center;gap:8px}

  /* AI search explainer */
  .aiBox{background:#f0f9ff;border:1px solid #bae6fd;border-radius:12px;padding:22px 24px;margin-top:6px;break-inside:avoid}

  /* CTA */

  .ctaBox p{margin:0 0 12px;font-size:14px;line-height:1.65;color:#e2e8f0}
  .ctaBox a{color:#7dd3fc;text-decoration:none}
  .ctaContact{display:flex;flex-wrap:wrap;gap:6px 28px;margin-top:6px;padding-top:16px;border-top:1px solid rgba(255,255,255,.18);font-size:14px}
  .ctaContact .co{font-weight:800;font-size:16px;width:100%;margin-bottom:4px;color:#fff}
  .ctaContact span{color:#cbd5e1}

  .footerNote{margin-top:36px;border-top:1px solid #e2e8f0;padding-top:14px;font-size:11px;color:#94a3b8;line-height:1.6}

  @media print{
    *{-webkit-print-color-adjust:exact !important;print-color-adjust:exact !important}
    .no-print{display:none!important}
    .printArea{box-shadow:none!important;margin:0!important;max-width:100%!important;padding:0!important}
    #reportView{background:#fff!important}
    .docPad{padding:0!important}
    .page-break{break-before:page}
    @page{margin:15mm}
  }
  @media(max-width:560px){.winGrid{grid-template-columns:1fr}.catbar .lbl{flex:0 0 130px}}
</style>

<div id="scanView">
  <div class="wrap">

<script>
const BRAND = {
  name:'Blue Collar AI, Inc.',
  tagline:'AI-Powered Local SEO',
  web:'www.bluecollarai.online',
  webUrl:'https://www.bluecollarai.online',
  sites:['www.bluecollarai.online','www.ustowalliance.com','www.usautoalliance.com'],
  contacts:[
    { name:'Chris',  phone:'614-633-7935', tel:'+16146337935', email:'chris@bluecollarai.online' },
    { name:'Dustin', phone:'614-206-3606', tel:'+16142063606', email:'dustin@bluecollarai.online' },
  ]
};

const PROXIES = [
  { name:'allorigins-raw', build:u=>`https://api.allorigins.win/raw?url=${encodeURIComponent(u)}`, json:false },
  { name:'codetabs',       build:u=>`https://api.codetabs.com/v1/proxy/?quest=${encodeURIComponent(u)}`, json:false },
  { name:'corsfix',        build:u=>`https://proxy.corsfix.com/?${u}`, json:false },
  { name:'allorigins-get', build:u=>`https://api.allorigins.win/get?url=${encodeURIComponent(u)}`, json:true },
  { name:'corsproxy',      build:u=>`https://corsproxy.io/?url=${encodeURIComponent(u)}`, json:false },
];
const TAGS = {
  'Google Analytics':['google-analytics.com','gtag(','/g/collect','_gaq'],
  'Google Tag Manager':['googletagmanager.com'],
  'Google Ads':['googleadservices.com','gtag/js?id=AW-'],
  'Meta / Facebook Pixel':['connect.facebook.net','fbq(','facebook.com/tr'],
  'Microsoft Clarity':['clarity.ms'],
  'Hotjar':['hotjar.com'],
  'TikTok Pixel':['analytics.tiktok.com','ttq.'],
  'LinkedIn Insight':['snap.licdn.com'],
};
// AI / answer-engine crawlers worth allowing for AI-search visibility
const AI_BOTS = ['GPTBot','OAI-SearchBot','ChatGPT-User','ClaudeBot','anthropic-ai','Claude-Web','PerplexityBot','Perplexity-User','Google-Extended','CCBot','Applebot-Extended','Amazonbot','Bytespider','Meta-ExternalAgent'];

const AISEARCH = 'AI Search & Answer Engines';

const sleep = ms => new Promise(r=>setTimeout(r,ms));
function esc(s){return String(s==null?'':s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}
function firstSentence(str){const m=String(str||'').match(/^[^.]*\./);return (m?m[0]:String(str||'')).trim();}

// Fixes that are bigger projects (need content, dev work, or third-party setup) vs. quick wins.
const PROJECT_FIXES = new Set([
  'Sufficient content','Served over HTTPS','No mixed (insecure) content','LocalBusiness structured data',
  'Reasonable page weight','Limited render-blocking scripts','Q&A / FAQ structured data',
  'Semantic main-content region','Review / rating schema (stars)',
  'Mobile speed score','Desktop speed score','Largest Contentful Paint (mobile)','Layout stability (mobile CLS)'
]);
function isQuick(label){ return !PROJECT_FIXES.has(label); }
function impactOf(points){ return points>=8?{lbl:'High impact',col:'#dc2626'} : points>=4?{lbl:'Medium impact',col:'#f59e0b'} : {lbl:'Low impact',col:'#64748b'}; }

async function fetchHtml(targetUrl){
  let lastErr;
  for(const p of PROXIES){
    const ctrl=new AbortController(); const t=setTimeout(()=>ctrl.abort(),12000);
    try{
      const res=await fetch(p.build(targetUrl),{signal:ctrl.signal});
      if(!res.ok){lastErr=new Error(p.name+' HTTP '+res.status);continue;}
      const html=p.json?(await res.json()).contents:await res.text();
      if(html&&html.length>50)return html;
      lastErr=new Error(p.name+' empty');
    }catch(e){lastErr=e;}finally{clearTimeout(t);}
  }
  throw lastErr||new Error('All proxies failed');
}
async function fetchAux(u){
  for(const p of PROXIES.slice(0,4)){
    const ctrl=new AbortController(); const t=setTimeout(()=>ctrl.abort(),8000);
    try{
      const res=await fetch(p.build(u),{signal:ctrl.signal});
      if(res.ok){const txt=p.json?(await res.json()).contents:await res.text();clearTimeout(t);return txt||'';}
    }catch(e){}finally{clearTimeout(t);}
  }
  return null;
}

// Parse robots.txt into user-agent groups and report which AI crawlers are blocked from the whole site.
function aiCrawlerStatus(robots){
  const lines=String(robots).split(/\r?\n/);
  let groups=[]; let cur=null;
  for(const raw of lines){
    const line=raw.replace(/#.*/,'').trim(); if(!line)continue;
    const ua=line.match(/^user-agent:\s*(.+)$/i);
    if(ua){ if(!cur||cur.hasRules){cur={agents:[],hasRules:false,disallowAll:false};groups.push(cur);} cur.agents.push(ua[1].trim().toLowerCase()); continue; }
    const dis=line.match(/^disallow:\s*(.*)$/i);
    if(dis&&cur){ cur.hasRules=true; if(dis[1].trim()==='/') cur.disallowAll=true; }
    if(/^allow:/i.test(line)&&cur) cur.hasRules=true;
  }
  const globalBlocked = groups.some(g=>g.agents.includes('*')&&g.disallowAll);
  const blocked=[];
  AI_BOTS.forEach(bot=>{ const lb=bot.toLowerCase(); if(groups.some(g=>g.agents.includes(lb)&&g.disallowAll)) blocked.push(bot); });
  return {blocked, globalBlocked};
}

const SEV = { fail:{tag:'Critical',color:'#dc2626',sevColor:'#dc2626'}, warn:{tag:'Improve',color:'#f59e0b',sevColor:'#f59e0b'}, pass:{color:'#16a34a'}, info:{color:'#94a3b8'} };

async function auditOne(raw){
  let url=raw.trim();
  if(!/^https?:\/\//i.test(url)) url='https://'+url;
  const o=new URL(url); const origin=o.origin;
  const html=await fetchHtml(url);
  const doc=new DOMParser().parseFromString(html,'text/html');

  // guards
  const bodyText=(doc.body?.textContent||'').trim();
  if(html.length<500||bodyText.length<30) throw {blocked:true,reason:'Empty or near-empty response — the real page could not be retrieved (proxy or site issue). Try again.'};
  const tLow=(doc.querySelector('title')?.textContent||'').trim().toLowerCase();
  const cTitles=['just a moment','one moment','attention required','checking your browser','please wait','verifying you are human','ddos-guard'];
  const cSigs=['challenges.cloudflare.com','cf-browser-verification','__cf_chl','cf_chl_opt','/cdn-cgi/challenge','ddos-guard','_imperva_','distil_r_captcha'];
  if(cTitles.some(t=>tLow.includes(t))||cSigs.some(s=>html.includes(s))) throw {blocked:true,reason:'Blocked by bot protection (a Cloudflare / DDoS-Guard style challenge page was returned, not the site).'};

  const checks=[];
  const add=(cat,label,points,status,detail,why,fix)=>checks.push({cat,label,points,status,detail,why,fix});

  // ---- gather ----
  const titleEl=doc.querySelector('title');
  const title=(titleEl?.textContent||'').trim();
  const titleCount=doc.querySelectorAll('title').length;
  const desc=(doc.querySelector('meta[name="description"]')?.getAttribute('content')||'').trim();
  const h1=doc.querySelectorAll('h1'); const h2=doc.querySelectorAll('h2');
  const robotsMeta=(doc.querySelector('meta[name="robots"]')?.getAttribute('content')||'').toLowerCase();
  const noindex=robotsMeta.includes('noindex');
  const canonical=doc.querySelector('link[rel="canonical"]');
  const viewport=doc.querySelector('meta[name="viewport"]');
  const charset=doc.querySelector('meta[charset]')||doc.querySelector('meta[http-equiv="Content-Type" i]');
  const lang=doc.documentElement.getAttribute('lang');
  const favicon=doc.querySelector('link[rel~="icon"]');
  const ogT=doc.querySelector('meta[property="og:title"]'), ogD=doc.querySelector('meta[property="og:description"]'), ogI=doc.querySelector('meta[property="og:image"]');
  const ogCount=[ogT,ogD,ogI].filter(Boolean).length;
  const twCard=doc.querySelector('meta[name="twitter:card"]');
  const imgs=[...doc.querySelectorAll('img')];
  const withAlt=imgs.filter(i=>(i.getAttribute('alt')||'').trim()).length;
  const withDim=imgs.filter(i=>i.getAttribute('width')&&i.getAttribute('height')).length;
  const words=bodyText.split(/\s+/).filter(Boolean).length;
  const tel=doc.querySelectorAll('a[href^="tel:"]').length;
  const hasMap=/google\.com\/maps|maps\.google|goo\.gl\/maps/i.test(html);
  const ssl=url.startsWith('https');
  const mixed= ssl ? [...doc.querySelectorAll('[src],[href]')].filter(el=>/^http:\/\//i.test(el.getAttribute('src')||el.getAttribute('href')||'')).length : 0;
  const blocking=doc.querySelectorAll('head script[src]:not([async]):not([defer])').length;
  const sizeKb=Math.round(html.length/1024);
  // schema
  let schemaTypes=[];
  doc.querySelectorAll('script[type="application/ld+json"]').forEach(n=>{try{const j=JSON.parse(n.textContent);const arr=Array.isArray(j)?j:[j];arr.forEach(x=>{const t=x['@type'];if(t)schemaTypes=schemaTypes.concat(Array.isArray(t)?t:[t]);if(x['@graph'])x['@graph'].forEach(g=>{if(g['@type'])schemaTypes=schemaTypes.concat(g['@type'])})});}catch(e){}});
  if(doc.querySelector('[itemtype]')) schemaTypes.push((doc.querySelector('[itemtype]').getAttribute('itemtype')||'').split('/').pop());
  schemaTypes=[...new Set(schemaTypes.filter(Boolean))];
  const schemaStr=schemaTypes.join(' ');
  const localSchema=schemaTypes.some(t=>/LocalBusiness|AutoRepair|AutomotiveBusiness|Store|Organization|ProfessionalService|HomeAndConstructionBusiness|EmergencyService/i.test(t));
  // AI-search / rich-result signals
  const hasFaq = /FAQPage|QAPage|Question/i.test(schemaStr) || /"@type"\s*:\s*"(FAQPage|QAPage|Question)"/i.test(html);
  const hasOrg = schemaTypes.some(t=>/Organization|LocalBusiness|AutoRepair|AutomotiveBusiness|Store|ProfessionalService|HomeAndConstructionBusiness|EmergencyService/i.test(t));
  const hasSameAs = /"sameAs"/i.test(html);
  const hasReview = /AggregateRating|"@type"\s*:\s*"Review"|"reviewRating"|"ratingValue"/i.test(html);
  const hasMain = !!(doc.querySelector('main')||doc.querySelector('article'));
  // tracking (informational)
  const tracking=Object.keys(TAGS).filter(name=>TAGS[name].some(s=>html.includes(s)));

  // ---- CHECKS ----
  const INDEX='Indexability & Crawlability', CONTENT='On-Page Content', TECH='Technical & Mobile', LOCAL='Local SEO', SOCIAL='Social Sharing', MEDIA='Images & Accessibility', PERF='Performance Hygiene';

  add(INDEX,'Page is indexable',14, noindex?'fail':'pass',
    noindex?'A "noindex" directive is present':'No noindex directive',
    'A "noindex" tag is a stop sign telling Google to hide this page completely. If it is there by mistake, nothing else you do matters — you are invisible in search.',
    'Remove the "noindex" value from the robots meta tag so search engines can list the page.');
  add(INDEX,'Canonical URL set',6, canonical?'pass':'fail',
    canonical?('→ '+canonical.getAttribute('href')):'No canonical link',
    'This tells Google which version of your web address is the real one, so your ranking power is not split between www / non-www or trailing-slash duplicates.',
    'Add <link rel="canonical" href="'+esc(origin)+'/"> in the page head pointing to the preferred URL.');

  add(CONTENT,'Title tag present',12, title?'pass':'fail',
    title?('"'+title+'"'):'Missing',
    'Your title is the blue headline people click in Google. It is the single strongest thing on the page for both ranking and earning the click.',
    'Add a unique <title> of about 50–60 characters that names the business and primary service + city.');
  if(title){
    const tl=title.length;
    add(CONTENT,'Title length optimal',4, (tl>=30&&tl<=60)?'pass':'warn',
      tl+' characters',
      'Titles under ~30 characters waste the opportunity; over ~60 get chopped off mid-sentence in results.',
      'Aim for 50–60 characters, e.g. "Auto Repair in Hilliard, OH | Shop Name".');
    if(titleCount>1) add(CONTENT,'Single title tag',2,'warn',titleCount+' title tags found','More than one title confuses search engines about which one to show.','Keep exactly one <title> tag.');
  }
  add(CONTENT,'Meta description present',9, desc?'pass':'fail',
    desc?('"'+desc.slice(0,90)+(desc.length>90?'…':'')+'"'):'Missing',
    'This is the grey summary under your title in Google. It does not change ranking, but a good one convinces people to click you instead of a competitor.',
    'Write a compelling 120–155 character summary with the service, location, and a reason to click (e.g. "Call now").');
  if(desc) add(CONTENT,'Description length optimal',3,(desc.length>=80&&desc.length<=160)?'pass':'warn',desc.length+' characters','Too short under-sells you; over ~160 characters gets cut off.','Target 120–155 characters.');
  add(CONTENT,'Exactly one H1 heading',8, h1.length===1?'pass':'fail',
    h1.length+' H1 tag(s)',
    'The H1 is the big headline on the page. None means Google cannot tell what the page is about; several muddy the signal and can look spammy.',
    h1.length===0?'Add a single visible <h1> with your main service + city.':'Keep one <h1> and demote the others to <h2>.');
  add(CONTENT,'Uses subheadings (H2)',3, h2.length>0?'pass':'warn',h2.length+' H2 tag(s)','Subheadings make the page easy to skim for customers and easy to understand for search engines and AI.','Break content into sections with descriptive H2 headings.');
  add(CONTENT,'Sufficient content',5, words>=250?'pass':'warn',words+' words of visible text','Thin pages rarely rank. Google rewards pages that actually answer what the visitor came for.','Add genuinely useful content — services, areas served, FAQs — aiming for 300+ words.');

  add(TECH,'Served over HTTPS',9, ssl?'pass':'fail', ssl?'Secure':'Not secure','The padlock in the browser bar. Google ranks secure sites higher and browsers scare visitors away from sites without it.','Install an SSL certificate (free via Let\'s Encrypt or your host) and force HTTPS.');

  add(LOCAL,'Map / location reference',3, hasMap?'pass':'warn', hasMap?'Map detected':'No map embed found','A map and visible address prove to Google (and customers) exactly where you serve.','Embed a Google Map and show the full address (matching your Google Business Profile).');

  add(SOCIAL,'Open Graph tags',5, ogCount>=2?'pass':(ogCount===1?'warn':'fail'), ogCount+' of 3 core OG tags','Controls how your link looks when shared on Facebook, in texts, and on LinkedIn. A bare, ugly link looks unprofessional and gets ignored.','Add og:title, og:description, and og:image meta tags.');
  add(SOCIAL,'Twitter / X card',3, twCard?'pass':'warn', twCard?'Configured':'Missing','Controls the preview when your link is shared on X (Twitter).','Add <meta name="twitter:card" content="summary_large_image">.');

  add(MEDIA,'Images have alt text',6, !imgs.length?'warn':(withAlt/imgs.length>=0.8?'pass':(withAlt/imgs.length>=0.4?'warn':'fail')),

  // ---- AI SEARCH / ANSWER ENGINES ----
  add(AISEARCH,'Q&A / FAQ structured data',5, hasFaq?'pass':'warn',

  return { url, domain:o.hostname, origin, timestamp:new Date().toLocaleString(), ssl, checks, tracking, schemaTypes,

async function addAux(r){
  // best-effort robots.txt + sitemap + AI-crawler + llms.txt, never fail the audit
  const INDEX='Indexability & Crawlability';
  const robots=await fetchAux(r.origin+'/robots.txt');
  if(robots===null){
    r.checks.push({cat:INDEX,label:'robots.txt present',points:0,status:'info',detail:'Could not verify (fetch blocked)',why:'',fix:''});
    r.checks.push({cat:AISEARCH,label:'AI search crawlers allowed',points:0,status:'info',detail:'Could not verify robots.txt',why:'',fix:''});
  }else{
    const ok=/user-agent|disallow|sitemap/i.test(robots)&&!/<html/i.test(robots.slice(0,200));
    r.checks.push({cat:INDEX,label:'robots.txt present',points:4,status:ok?'pass':'warn',
      detail:ok?'Found':'Not found / not a valid robots file',
      why:'This file guides search engines and is usually where your sitemap is listed.',
      fix:'Add a /robots.txt that allows crawling and lists your sitemap.'});
    let smUrl=(robots.match(/sitemap:\s*(\S+)/i)||[])[1];
    let sm=null;
    if(smUrl) sm=await fetchAux(smUrl);
    if(!sm) sm=await fetchAux(r.origin+'/sitemap.xml');
    const smOk= sm!==null && /<urlset|<sitemapindex/i.test(sm);
    r.checks.push({cat:INDEX,label:'XML sitemap present',points:5,status: sm===null?'info':(smOk?'pass':'warn'),
      detail: sm===null?'Could not verify':(smOk?'Found':'Not found'),
      why:'A sitemap is a table of contents that helps Google find and list all your pages quickly.',
      fix:'Generate /sitemap.xml and reference it in robots.txt.'});
    // AI crawler access (uses the robots.txt we already fetched)
    const ai=aiCrawlerStatus(robots);
    let st,det;
    if(ai.globalBlocked){ st='fail'; det='robots.txt blocks all crawlers (Disallow: /)'; }
    else if(ai.blocked.length){ st='warn'; det='Blocking: '+ai.blocked.join(', '); }
    else { st='pass'; det='No AI crawlers blocked'; }
    r.checks.push({cat:AISEARCH,label:'AI search crawlers allowed',points:5,status:st,detail:det,
      why:'Search is shifting toward AI answers. If robots.txt blocks bots like GPTBot, ClaudeBot, PerplexityBot or Google-Extended, those tools cannot read your site and will not recommend your business.',
      fix:'In robots.txt, avoid disallowing AI crawlers (GPTBot, OAI-SearchBot, ChatGPT-User, ClaudeBot, PerplexityBot, Google-Extended) unless you have a specific reason to.'});
  }
  // llms.txt — emerging AI-guide standard
  const llms=await fetchAux(r.origin+'/llms.txt');
  const llmsOk = llms!==null && llms.length>20 && !/<html/i.test(llms.slice(0,200));
  r.checks.push({cat:AISEARCH,label:'llms.txt AI guide file',points:3,status: llms===null?'info':(llmsOk?'pass':'warn'),
    detail: llms===null?'Could not verify':(llmsOk?'Found':'Not found'),
    why:'llms.txt is a fast-emerging standard: a plain-text file that tells AI assistants what your site offers and which pages matter most, so they describe and recommend you accurately.',
    fix:'Add a /llms.txt file summarizing your business, key services, and important page links in plain text / markdown.'});
}

// ---- Google PageSpeed Insights (real load speed, mobile + desktop) ----
async function fetchPSI(url, strategy, key){
  let api=`https://www.googleapis.com/pagespeedonline/v5/runPagespeed?url=${encodeURIComponent(url)}&strategy=${strategy}&category=performance`;
  if(key) api+=`&key=${encodeURIComponent(key)}`;
  const ctrl=new AbortController(); const t=setTimeout(()=>ctrl.abort(),60000);
  try{
    const res=await fetch(api,{signal:ctrl.signal});
    if(!res.ok) return {error:'HTTP '+res.status};
    const j=await res.json();
    const lh=j.lighthouseResult;
    if(!lh) return {error:'no data'};
    const a=lh.audits||{};
    const perf=lh.categories&&lh.categories.performance?lh.categories.performance.score:null;
    return {
      score: perf==null?null:Math.round(perf*100),
      lcp: a['largest-contentful-paint']?a['largest-contentful-paint'].numericValue:null,
      lcpTxt: a['largest-contentful-paint']?a['largest-contentful-paint'].displayValue:null,
      cls: a['cumulative-layout-shift']?a['cumulative-layout-shift'].numericValue:null,
      clsTxt: a['cumulative-layout-shift']?a['cumulative-layout-shift'].displayValue:null,
      tbtTxt: a['total-blocking-time']?a['total-blocking-time'].displayValue:null,
      field: j.loadingExperience&&j.loadingExperience.overall_category?j.loadingExperience.overall_category:null
    };
  }catch(e){ return {error:e.name==='AbortError'?'timeout':'fetch failed'}; }
  finally{ clearTimeout(t); }
}
async function addSpeed(r, key){
  const SPEED='Page Speed & Core Web Vitals';
  const [m,d]=await Promise.all([fetchPSI(r.url,'mobile',key), fetchPSI(r.url,'desktop',key)]);
  r.speed={mobile:m, desktop:d};
  const scoreStatus=s=> s==null?'info' : s>=90?'pass' : s>=50?'warn':'fail';
  // Mobile score (weighted highest — Google is mobile-first)
  if(m.error){
    r.checks.push({cat:SPEED,label:'Mobile speed score',points:0,status:'info',detail:'Could not measure ('+m.error+')',why:'',fix:''});
  }else{
    r.checks.push({cat:SPEED,label:'Mobile speed score',points:6,status:scoreStatus(m.score),
      detail:(m.score!=null?m.score+'/100':'n/a')+(m.field?' · real users: '+m.field.toLowerCase().replace('_',' '):''),
      why:'Google measures your site by its phone version first, and most local searches happen on phones. A slow mobile site quietly loses customers and rankings.',
      fix:'Compress and lazy-load images, enable caching / a CDN, and defer non-critical scripts. PageSpeed Insights lists the exact opportunities.'});
    if(m.lcp!=null){ const s= m.lcp<=2500?'pass':m.lcp<=4000?'warn':'fail';
      r.checks.push({cat:SPEED,label:'Largest Contentful Paint (mobile)',points:4,status:s,
        detail:(m.lcpTxt||Math.round(m.lcp)+' ms')+' (good ≤ 2.5s)',
        why:'LCP is how long until the main content actually appears. Over 2.5 seconds feels slow and hurts both conversions and ranking.',
        fix:'Optimize the largest image / hero, use modern formats (WebP/AVIF), and remove render-blocking CSS and scripts.'});
    }
    if(m.cls!=null){ const s= m.cls<=0.1?'pass':m.cls<=0.25?'warn':'fail';
      r.checks.push({cat:SPEED,label:'Layout stability (mobile CLS)',points:2,status:s,
        detail:(m.clsTxt!=null?String(m.clsTxt):String(m.cls))+' (good ≤ 0.1)',
        why:'CLS measures how much the page jumps around while loading. Jumpy pages frustrate visitors and are penalized by Google.',
        fix:'Set width and height on images and reserve space for ads, banners, and embeds.'});
    }
  }
  // Desktop score
  if(d.error){
    r.checks.push({cat:SPEED,label:'Desktop speed score',points:0,status:'info',detail:'Could not measure ('+d.error+')',why:'',fix:''});
  }else{
    r.checks.push({cat:SPEED,label:'Desktop speed score',points:3,status:scoreStatus(d.score),
      detail:(d.score!=null?d.score+'/100':'n/a'),
      why:'Desktop speed still matters for the office and at-home customers researching your services on a computer.',
      fix:'Same wins as mobile: optimize images, enable caching, and defer non-critical scripts.'});
  }
}

function score(r){
  if(r.error) return {score:null,grade:'—',color:'#94a3b8',counts:{pass:0,warn:0,fail:0},byCat:{},verdict:'',scored:0};
  let earned=0,total=0,scored=0; const counts={pass:0,warn:0,fail:0}; const byCat={};
  r.checks.forEach(c=>{
    if(c.status==='pass')counts.pass++; else if(c.status==='warn')counts.warn++; else if(c.status==='fail')counts.fail++;
    if(c.status==='info'||!c.points) return;
    scored++;
    const w= c.status==='pass'?1: c.status==='warn'?0.5:0;
    earned+=c.points*w; total+=c.points;
    if(!byCat[c.cat])byCat[c.cat]={e:0,t:0};
    byCat[c.cat].e+=c.points*w; byCat[c.cat].t+=c.points;
  });
  const s= total? Math.round(100*earned/total):0;
  let grade,color;
  if(s>=90){grade='A';color='#16a34a';} else if(s>=80){grade='B';color='#65a30d';}
  else if(s>=70){grade='C';color='#f59e0b';} else if(s>=55){grade='D';color='#f97316';} else {grade='F';color='#dc2626';}
  const verdict = s>=90?'Strong SEO foundation with only minor polish needed.'
    : s>=80?'Solid, but a handful of fixes would meaningfully improve visibility.'
    : s>=70?'Several important gaps are holding this site back in search.'
    : s>=55?'Significant SEO problems are limiting how often this site is found.'
    : 'Major SEO issues — the site is likely losing substantial search traffic.';
  return {score:s,grade,color,counts,byCat,verdict,scored};
}

let reports=[];

async function runScan(){
  const eb=document.getElementById('errorBox'); eb.style.display='none';
  const list=document.getElementById('urls').value.split(/[\n,]+/).map(u=>u.trim()).filter(Boolean);
  if(!list.length){eb.textContent='Enter at least one URL.';eb.style.display='block';return;}
  const btn=document.getElementById('scanBtn'); btn.disabled=true;
  const psiOn=document.getElementById('psiOn').checked;
  const psiKey=document.getElementById('psiKey').value.trim();
  try{ localStorage.setItem('bcai_psiKey', psiKey); }catch(e){}
  reports=[]; document.getElementById('actionRow').style.display='none'; document.getElementById('results').innerHTML='';
  for(let i=0;i<list.length;i++){
    btn.textContent=`⏳ Auditing ${i+1} of ${list.length}: ${list[i]}`;
    try{
      const r=await auditOne(list[i]);
      btn.textContent=`⏳ Checking crawlability & AI readiness ${i+1}/${list.length}…`;
      try{ await addAux(r); }catch(e){}
      if(psiOn){ btn.textContent=`⏳ Measuring page speed (mobile + desktop) ${i+1}/${list.length}…`; try{ await addSpeed(r, psiKey); }catch(e){} }
      reports.push(r);
    }catch(e){
      let domain=list[i]; try{domain=new URL(/^https?:\/\//i.test(list[i])?list[i]:'https://'+list[i]).hostname;}catch(_){}
      reports.push({url:list[i],domain,error:(e&&e.blocked&&e.reason)?e.reason:'Could not fetch (proxy blocked, rate-limited, or invalid URL).'});
    }
    renderResults();
    if(list.length>1&&i<list.length-1) await sleep(900);
  }
  btn.textContent='🔎 Run Audit'; btn.disabled=false;
  if(reports.length&&reports.every(r=>r.error)){eb.textContent='None of the sites could be audited — public proxies may be rate-limited. Try again shortly.';eb.style.display='block';}
}

function badge(r,size){
  const sc=score(r);
  return `<div style="width:${size}px;height:${size}px;border-radius:50%;border:5px solid ${sc.color};display:flex;flex-direction:column;align-items:center;justify-content:center;flex-shrink:0">
    <span style="font-size:${size*0.36}px;font-weight:800;color:${sc.color};line-height:1">${sc.grade}</span>
    <span style="font-size:${size*0.17}px;color:#64748b;margin-top:2px">${sc.score==null?'n/a':sc.score}</span></div>`;
}
function findRow(c){
  const col=SEV[c.status].color;
  const showFix = c.status!=='pass'&&c.fix;
  return `<div class="findRow"><span class="dot" style="background:${col}"></span><div>
    <div class="findLabel">${esc(c.label)} <span class="muted">— ${esc(c.detail)}</span></div>
    ${showFix?`<div class="findFix"><strong>Fix:</strong> ${esc(c.fix)}</div>`:''}</div></div>`;
}
function cardHtml(r){
  if(r.error) return `<div class="card"><div class="cardHead"><div><h2>${esc(r.domain)}</h2><span class="muted">Audit failed</span></div></div><p style="color:#dc2626;font-weight:600">⚠ ${esc(r.error)}</p></div>`;
  const sc=score(r);
  const issues=r.checks.filter(c=>c.status==='fail'||c.status==='warn').sort((a,b)=>(a.status===b.status?b.points-a.points:(a.status==='fail'?-1:1)));
  const passes=r.checks.filter(c=>c.status==='pass');
  return `<div class="card">
    <div class="cardHead"><div><h2>${esc(r.domain)}</h2><span class="muted">${esc(r.timestamp)}</span></div>${badge(r,72)}</div>
    <div class="tally">
      <span class="pill ok">✓ ${sc.counts.pass} passing</span>
      <span class="pill warn">! ${sc.counts.warn} to improve</span>
      <span class="pill fail">✕ ${sc.counts.fail} critical</span>
    </div>
    <p class="muted" style="margin:4px 0 0">${esc(sc.verdict)}</p>
    <div class="sectionTitle">What needs attention</div>
    ${issues.length?issues.map(findRow).join(''):'<p class="muted">Nothing major — nice site.</p>'}
    <details><summary>✓ What's working (${passes.length})</summary>${passes.map(findRow).join('')}</details>
    ${r.tracking.length?`<div class="sectionTitle">Tracking detected</div><p class="muted">${r.tracking.map(esc).join(' · ')}${r.tracking.includes('Google Tag Manager')?' — note: Tag Manager can load more tags than are visible here.':''}</p>`:''}
  </div>`;
}
function renderResults(){
  document.getElementById('results').innerHTML=reports.map(cardHtml).join('');
  const row=document.getElementById('actionRow');
  if(reports.length){row.style.display='flex';document.getElementById('openReportBtn').textContent='📄 Open Branded Report'+(reports.length>1?` (${reports.length} sites)`:'');}
  else row.style.display='none';
}

function reportSection(r){
  const sc=score(r);
  if(r.error) return `<p style="color:#dc2626;font-weight:700;font-size:14px">⚠ ${esc(r.error)}</p>`;
  const issues=r.checks.filter(c=>c.status==='fail'||c.status==='warn').sort((a,b)=>(a.status===b.status?b.points-a.points:(a.status==='fail'?-1:1)));
  const passes=r.checks.filter(c=>c.status==='pass');
  const cats=Object.keys(sc.byCat);
  const top=issues.slice(0,3);
  const quick=issues.filter(c=>isQuick(c.label));
  const proj=issues.filter(c=>!isQuick(c.label));

  // Plain-language executive summary
  let sum=`We ran a ${sc.scored}-point inspection of this site's homepage — it passed ${sc.counts.pass} of them. `;
  if(sc.counts.fail) sum+=`${sc.counts.fail} critical issue${sc.counts.fail>1?'s were':' was'} found that can directly limit how often you appear in Google and AI search results. `;
  if(sc.counts.warn) sum+=`Another ${sc.counts.warn} area${sc.counts.warn>1?'s are':' is'} worth improving to win more nearby customers. `;
  if(!sc.counts.fail&&!sc.counts.warn) sum+=`No significant problems were found — this is a well-optimized page. `;
  else sum+=`Start with the Quick Wins below for the fastest results.`;

  const execTop = `<section class="rSec execBox" style="border-color:${sc.color}">
    <div class="execTop">
      ${badge(r,84)}
      <div>
        <div class="execLabel">Executive Summary</div>
        <div class="execScore" style="color:${sc.color}">${sc.score}/100 · Grade ${sc.grade}</div>
        <div class="execVerdict">${esc(sc.verdict)}</div>
        <div style="margin-top:6px;font-size:13px;color:#475569">
          <strong style="color:#16a34a">${sc.counts.pass}</strong> passing &nbsp;·&nbsp;
          <strong style="color:#b45309">${sc.counts.warn}</strong> to improve &nbsp;·&nbsp;
          <strong style="color:#b91c1c">${sc.counts.fail}</strong> critical
        </div>
      </div>
    </div>
    <p class="execText">${esc(sum)}</p>
    ${top.length?`<div class="execLabel">Top ${top.length} ${top.length>1?'priorities':'priority'}</div>
      <ol class="execList">${top.map(c=>`<li><strong>${esc(c.label)}</strong> — ${esc(firstSentence(c.why))}</li>`).join('')}</ol>`:''}
  </section>`;

  const catBreakdown = `<div class="rH2">Category Breakdown</div>
  ${cats.map(c=>{const p=Math.round(100*sc.byCat[c].e/sc.byCat[c].t);const col=p>=80?'#16a34a':p>=60?'#f59e0b':'#dc2626';
    return `<div class="catbar"><span class="lbl">${esc(c)}</span><span class="track"><span class="fill" style="width:${p}%;background:${col}"></span></span><span style="flex:0 0 38px;text-align:right;font-weight:700;color:${col}">${p}%</span></div>`;}).join('')}`;

  let actionPlan;
  if(!issues.length){
    actionPlan = `<div class="rH2">Your Action Plan</div><p style="font-size:14px;color:#16a34a;font-weight:600">No significant issues found — nice work.</p>`;
  }else{
    actionPlan = `<div class="rH2">Your Action Plan (${issues.length} item${issues.length>1?'s':''})</div>
    ${quick.length?`<div class="planSub">⚡ Quick Wins <span style="font-weight:600;color:#64748b;font-size:12px">— high impact, low effort</span></div>
      <p class="planNote">Fast fixes you (or your web person) can usually make in minutes inside your site builder or settings.</p>
      ${quick.map(issueCardHtml).join('')}`:''}
    ${proj.length?`<div class="planSub">🔧 Bigger Projects <span style="font-weight:600;color:#64748b;font-size:12px">— worth planning for</span></div>
      <p class="planNote">These take a bit more work (content, code, or setup) but deliver lasting gains. ${esc(BRAND.name.replace(/,.*/,''))} can handle these for you.</p>
      ${proj.map(issueCardHtml).join('')}`:''}`;
  }

  return `
  ${execTop}
  ${catBreakdown}
  ${actionPlan}
  <div class="rH2">What This Site Does Right (${passes.length})</div>
  <div class="winGrid">${passes.map(c=>`<div class="win">✓ ${esc(c.label)}</div>`).join('')}</div>
  ${speedPanel(r)}
  ${r.tracking.length?`<div class="rH2">Analytics &amp; Tracking</div><p style="font-size:13px;color:#475569">Detected: ${r.tracking.map(esc).join(', ')}.${r.tracking.includes('Google Tag Manager')?' Google Tag Manager is present, which can load additional tags client-side beyond what this scan sees.':''}</p>`:''}
  <div class="rH2">Page Snapshot</div>
  <table class="doc"><tbody>
    <tr><td>HTTPS</td><td>${r.ssl?'Yes':'No'}</td><td>Images</td><td>${r.stats.images}</td></tr>
    <tr><td>Word count</td><td>${r.stats.words}</td><td>Scripts</td><td>${r.stats.scripts}</td></tr>
    <tr><td>HTML size</td><td>${r.stats.sizeKb} KB</td><td>Structured data</td><td>${r.schemaTypes.length?esc(r.schemaTypes.join(', ')):'None'}</td></tr>
  </tbody></table>`;
}

function speedPanel(r){
  if(!r.speed) return '';
  const m=r.speed.mobile, d=r.speed.desktop;
  if((!m||m.error)&&(!d||d.error)) return '';
  const chip=(lbl,s)=>{ if(s==null)return ''; const col=s>=90?'#16a34a':s>=50?'#f59e0b':'#dc2626';
    return `<div style="text-align:center;min-width:90px"><div style="font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.04em;color:#64748b">${lbl}</div><div style="font-size:32px;font-weight:800;color:${col};line-height:1.1">${s}</div><div style="font-size:10px;color:#94a3b8">out of 100</div></div>`; };
  return `<div class="rH2">Page Speed — Google PageSpeed Insights</div>
   <div class="scoreWrap" style="display:flex;gap:26px;flex-wrap:wrap;align-items:center;background:#f8fafc;border:1px solid #e2e8f0;border-radius:12px;padding:18px 22px">
     ${chip('📱 Mobile', m&&!m.error?m.score:null)}
     ${chip('💻 Desktop', d&&!d.error?d.score:null)}
     <div style="flex:1;min-width:220px;font-size:12.5px;color:#475569;line-height:1.6">
       ${m&&!m.error&&m.lcpTxt?`Largest Contentful Paint: <strong>${esc(m.lcpTxt)}</strong> <span style="color:#94a3b8">(mobile · good ≤ 2.5s)</span><br>`:''}
       ${m&&!m.error&&m.clsTxt!=null?`Cumulative Layout Shift: <strong>${esc(String(m.clsTxt))}</strong> <span style="color:#94a3b8">(mobile · good ≤ 0.1)</span><br>`:''}
       ${m&&!m.error&&m.field?`Real-world experience: <strong>${esc(m.field.toLowerCase().replace('_',' '))}</strong><br>`:''}
       <span style="color:#94a3b8">Scores: 90–100 fast · 50–89 needs work · under 50 slow.</span>
     </div>
   </div>`;
}
function aiExplainer(){
  return `<div class="rH2">Why AI Search Matters</div>
  <div class="aiBox">
    <p><strong>What it is.</strong> AI search tools — ChatGPT, Google's AI Overviews, Perplexity, Microsoft Copilot, and Gemini — answer a question in plain language instead of handing back a page of links. You ask, and the AI writes a direct answer, often recommending just one or two businesses by name.</p>
    <div class="aiCols">
      <div class="aiCol"><h5>Traditional search — Google &amp; Bing</h5><p>Hands you a list of ~10 links and lets you click around to decide. The site that ranks #1 wins the visit. Success is largely about keywords and backlinks.</p></div>
      <div class="aiCol"><h5>AI search — ChatGPT, AI Overviews, Perplexity…</h5><p>Gives one written answer and usually names only a few sources — the customer often never clicks a website at all. The goal isn't ranking #1; it's being the business the AI recommends. It leans on clear content, structured data, and reviews to decide who to trust.</p></div>
    </div>
    <p><strong>Who's using it.</strong> Adoption has been the fastest of any consumer technology in history — hundreds of millions of people now use these tools every week. Usage runs highest among Gen Z and Millennials (roughly ages 18–44), who increasingly ask AI for recommendations before they ever open Google, but it's growing quickly across every age group, including older customers.</p>
    <p><strong>Why it matters for you.</strong> People now research local services through AI the same way they used to Google them — "who's the best-reviewed shop near me," "is this company trustworthy," "who can tow my car tonight." If the AI can't read and understand your site, your business simply isn't part of that conversation. The AI-search items in this report are what make sure you are.</p>
  </div>`;
}
function ctaBlock(){
  return `<div class="rH2">Ready to Fix This?</div>
  <div class="ctaBox">
    <p>Everything in this report is fixable — most of it faster than you'd think. <strong>${esc(BRAND.name)}</strong> helps local businesses turn audits like this into more calls, more customers, and higher rankings in both Google <em>and</em> the new AI search tools.</p>
    <p><strong>Your next steps:</strong> &nbsp;1) Knock out the Quick Wins. &nbsp;2) Re-scan to confirm. &nbsp;3) Reach out and we'll handle the heavy lifting — including the AI-search items most agencies aren't even checking yet.</p>
    <div class="ctaContact">
      <div class="co">${esc(BRAND.name)}</div>
      ${BRAND.contacts.map(c=>`<span><strong style="color:#fff">${esc(c.name)}</strong> &nbsp;📞 <a href="tel:${esc(c.tel)}">${esc(c.phone)}</a> &nbsp;✉ <a href="mailto:${esc(c.email)}">${esc(c.email)}</a></span>`).join('')}
      <span>🌐 ${BRAND.sites.map(s=>`<a href="https://${esc(s)}">${esc(s)}</a>`).join(' &nbsp;·&nbsp; ')}</span>
    </div>
  </div>`;
}

function renderReport(){
  const fmt=new Date().toLocaleDateString(undefined,{year:'numeric',month:'long',day:'numeric'});
  const multi=reports.length>1;
  const brand=`<div style="text-align:right">
    <div style="font-size:17px;font-weight:800;color:#0f172a">${esc(BRAND.name)}</div>
    <div style="font-size:11px;color:#64748b;letter-spacing:.03em;text-transform:uppercase">${esc(BRAND.tagline)}</div>
    <div style="font-size:12px;color:#94a3b8;margin-top:4px">${esc(BRAND.web)} · ${fmt}</div>
  </div>`;

  const hasSpeed = reports.some(r=>r.speed);
  const mob = r => (r.speed&&r.speed.mobile&&!r.speed.mobile.error&&r.speed.mobile.score!=null)?r.speed.mobile.score:null;
  const dsk = r => (r.speed&&r.speed.desktop&&!r.speed.desktop.error&&r.speed.desktop.score!=null)?r.speed.desktop.score:null;
  const spCell = s => { if(s==null) return '<td>—</td>'; const col=s>=90?'#16a34a':s>=50?'#f59e0b':'#dc2626'; return `<td style="font-weight:700;color:${col}">${s}</td>`; };
  // Fastest-first ranking when speed data exists (rows without a score fall to the bottom)
  const rankRows = hasSpeed ? [...reports].sort((a,b)=>((mob(b)==null?-1:mob(b))-(mob(a)==null?-1:mob(a)))) : reports;
  const summaryTable= multi?`
    <div class="rH2">Audit Summary — ${reports.length} Sites</div>
    ${hasSpeed?'<p style="font-size:12px;color:#64748b;margin:-6px 0 12px">Sorted by mobile page speed — fastest first.</p>':''}
    <table class="doc"><thead><tr><th>Website</th>${hasSpeed?'<th>📱 Mobile</th><th>💻 Desktop</th>':''}<th>SEO Score</th><th>Critical</th><th>To Improve</th><th>Passing</th></tr></thead><tbody>
    ${rankRows.map(r=>{const sc=score(r);return `<tr><td>${esc(r.domain)}</td>
      ${hasSpeed?(r.error?'<td>—</td><td>—</td>':(spCell(mob(r))+spCell(dsk(r)))):''}
      <td style="font-weight:700;color:${sc.color}">${sc.score==null?'—':sc.grade+' ('+sc.score+')'}</td>
      <td>${r.error?'—':sc.counts.fail}</td><td>${r.error?'—':sc.counts.warn}</td><td>${r.error?'—':sc.counts.pass}</td></tr>`;}).join('')}
    </tbody></table>`:'';

  const sites=reports.map((r,i)=>`<div class="${(multi||i>0)?'page-break':''}" style="margin-top:${i>0?'34px':'0'}">
    <div style="display:flex;justify-content:space-between;align-items:center;gap:14px;border-bottom:1px solid #e2e8f0;padding-bottom:12px;margin-bottom:18px">
      <div><h2 style="margin:0;font-size:22px;color:#0f172a">${esc(r.domain)}</h2>
      <div style="font-size:12px;color:#94a3b8;word-break:break-all">${esc(r.url)}</div></div>
    </div>${reportSection(r)}</div>`).join('');

  document.getElementById('printArea').innerHTML=`
    <div class="rHeader">
      <div><h1 style="margin:0;font-size:30px;font-weight:800;color:#0f172a">SEO &amp; AI Search Audit</h1>
      <p style="margin:6px 0 0;font-size:15px;color:#64748b">${multi?reports.length+' websites':esc(reports[0].domain)}</p></div>
      ${brand}
    </div>
    ${summaryTable}${sites}
    ${aiExplainer()}
    ${ctaBlock()}
    <div class="footerNote">
      <strong>Prepared by ${esc(BRAND.name)}</strong><br>
      ${BRAND.contacts.map(c=>`${esc(c.name)} ${esc(c.phone)} · ${esc(c.email)}`).join(' &nbsp;|&nbsp; ')}<br>
      ${BRAND.sites.map(esc).join(' &nbsp;·&nbsp; ')}<br>
      Generated ${new Date().toLocaleString()}. This audit analyzes the homepage's initial HTML. Some content and tags loaded by JavaScript (e.g. via Google Tag Manager) and other pages on the site are not included. Page-speed and Core Web Vitals data, when shown, is measured live by Google PageSpeed Insights.
    </div>`;
}
function openReport(){renderReport();document.getElementById('scanView').style.display='none';document.getElementById('reportView').style.display='block';window.scrollTo(0,0);}
function closeReport(){document.getElementById('reportView').style.display='none';document.getElementById('scanView').style.display='block';}

// Pre-fill the PageSpeed API key: saved key first, then a local config.local.js fallback
try{ const el=document.getElementById('psiKey'); const k=localStorage.getItem('bcai_psiKey')||window.BCAI_PSI_KEY||''; if(el&&!el.value&&k) el.value=k; }catch(e){}
</script>
</body>
</html>
